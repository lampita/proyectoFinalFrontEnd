<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tickets Ya</title>
  <meta name="description"
    content="Trabajo Entrega Final Front end. Sitio de ventas de entradas para espectáculos musicales de Pop y Rock." />
  <meta name="robots" content="index, follow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <link rel="icon" type="image/png" sizes="48x48" href="./images/logo-48px.png" />
  <link rel="stylesheet" href="styles.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/js/all.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"> defer</script>
  <script src="bd.js" defer></script>
  <script src="scripts.js" defer></script>
</head>

<body>
  <header class="main-header">
    <nav class="nav-container">
      <ul class="nav-list">
        <li class="logo-item">
          <h2 class="logo">TICKETS YA</h2>
          <a href="index.html">
            <img src="./images/logo-48px.png" alt="Logo de Tickets Ya" />
          </a>
        </li>

        <li><a href="#" class="draw-btn">Contacto</a></li>
        <li>
          <span id="btn-register-open" class="draw-btn" style="cursor: pointer">Registrarse</span>
        </li>
        <li><button type="button" class="draw-btn">Login</button></li>
        <li>
          <button type="button" id="btn-cart-open" class="draw-btn cart-btn">
            <span>Carrito</span>
            <span id="cart-badge" class="cart-badge" aria-label="Cantidad de entradas en el carrito">0</span>
          </button>
        </li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero-section">
      <div class="layer-triangulo-fondo"></div>
      <div class="layer-png-principal"></div>

      <div class="hero-content">
        <div class="hero-text">
          <h1>TICKETS YA</h1>
          <p>Tus entradas para los mejores shows</p>
        </div>

        <span id="btn-popup-open" class="boton-video-heartbeat">
          <i class="fa-solid fa-play"></i>
        </span>

        <button type="button" id="btn-buy-open" class="boton-cta">
          <span>Comprar<br />Entradas</span>
        </button>
      </div>
    </section>

    <div id="video-popup" class="popup-overlay">
      <div class="popup-body">


        <div class="video-wrapper">
          <video controls preload="auto">
            <source src="./videos/Dua Lipa - Levitating _ 480p.mp4" type="video/mp4" />
            <track default kind="captions" srclang="es" src="./videos/captions.vtt" label="Español" />
            Tu navegador no soporta la reproducción de videos.
          </video><span id="btn-popup-close" class="popup-close-btn"><i class="fa-solid fa-xmark"></i></span>
        </div>
      </div>
    </div>

    <div id="register-modal" class="modal-overlay">
      <div class="modal-body">
        <div class="modal-nav-container">
          <span id="btn-register-close" class="modal-nav-btn back-btn" title="Atrás"><i
              class="fa-solid fa-arrow-left"></i></span>
          <span id="btn-register-home" class="modal-nav-btn home-btn" title="Inicio"><i
              class="fa-solid fa-xmark"></i></span>
        </div>
        <h2 class="modal-title">Únete a la Comunidad</h2>

        <form action="https://formspree.io/f/maqknaao" method="POST" class="draw-form">
          <div class="form-group">
            <label class="form-label">Nombre</label>
            <input type="text" class="draw-input" name="nombre" required placeholder="Tu nombre..." />
          </div>

          <div class="form-group">
            <label class="form-label">Apellido</label>
            <input type="text" class="draw-input" name="apellido" required placeholder="Tu apellido..." />
          </div>

          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="draw-input" name="email" required placeholder="ejemplo@correo.com" />
          </div>

          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" class="draw-input" name="password" required placeholder="Mínimo 8 caracteres" />
          </div>

          <div class="form-group">
            <label class="form-label">Confirmar Contraseña</label>
            <input type="password" class="draw-input" name="password-confirm" required
              placeholder="Repite tu contraseña" />
          </div>

          <button type="submit" class="draw-btn form-submit-btn">
            Crear Cuenta
          </button>
        </form>
      </div>
    </div>


    <div id="buy-modal" class="modal-overlay">
      <div class="modal-body buy-modal-body">
      </div>
    </div>

    <div id="cart-modal" class="modal-overlay">
      <div class="modal-body cart-modal-body">
        <div class="modal-nav-container">
          <span id="btn-cart-close" class="modal-nav-btn back-btn" title="Atrás"><i
              class="fa-solid fa-arrow-left"></i></span>
          <span id="btn-cart-home" class="modal-nav-btn home-btn" title="Inicio"><i
              class="fa-solid fa-xmark"></i></span>
        </div>
        <h2 class="modal-title">Tu Carrito</h2>
        <div id="cart-items-container" class="cart-items-list"></div>
        <p id="cart-feedback" class="cart-feedback" aria-live="polite"></p>
        <div class="cart-summary">
          <span class="cart-summary-label">Total a pagar</span>
          <strong id="cart-total" class="cart-total">$0</strong>
        </div>
        <div class="cart-actions">
          <button type="button" id="btn-finish-purchase" class="draw-btn cart-action-btn">Finalizar compra</button>
          <button type="button" id="btn-clear-cart" class="draw-btn cart-action-btn">Vaciar carrito</button>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-container">
      <p class="footer-copy">
        &copy; 2026 Tickets Ya. Todos los derechos reservados.
      </p>
      <div class="footer-socials">
        <a href="#" class="social-btn"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" class="social-btn"><i class="fa-brands fa-facebook"></i></a>
        <a href="#" class="social-btn"><i class="fa-brands fa-x-twitter"></i></a>
        <a href="#" class="social-btn"><i class="fa-brands fa-youtube"></i></a>
      </div>
    </div>
  </footer>
</body>

</html>
